<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">

<body>

    <div id="header-placeholder"></div>

    <section class="hero" style="height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; background: linear-gradient(rgba(21, 128, 61, 0.8), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1584281723351-95ad9970422c?auto=format&fit=crop&w=1600&q=80') center/cover;">
        <div style="font-size: 22px; margin-bottom: 10px;">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</div>

                    <a href="board.html" style="color: var(--primary); font-size: 14px; text-decoration: none; font-weight: bold;">বিস্তারিত <i class="fas fa-arrow-right"></i></a>
                </div>
                <div class="card">
                    <i class="fas fa-trophy"></i>
                    <h3>জাতীয় প্রতিযোগিতা</h3>

                    <i class="fas fa-users-gear"></i>
