<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কর্মকর্তাবৃন্দ | আল হুফফাজ ফাউন্ডেশন</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* প্রিমিয়াম হিরো সেকশন ডিজাইন */
        .committee-hero {
            background: linear-gradient(135deg, #166534 0%, #15803d 100%);
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            color: white;
            margin-bottom: 50px;
            box-shadow: 0 15px 40px rgba(21, 128, 61, 0.25);
            position: relative;
            overflow: hidden;
            border-bottom: 6px solid #f59e0b;
        }
        .committee-hero::before {
            content: '\f0c0'; /* fa-users icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            font-size: 200px;
            opacity: 0.05;
            right: -30px;
            bottom: -50px;
            transform: rotate(-15deg);
        }
        .committee-hero h3 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fcd34d; /* সোনালী কালার */
            position: relative;
            z-index: 1;
        }
        .committee-hero p {
            font-size: 17px;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }
        
        .team-container { display: flex; flex-direction: column; gap: 40px; }
        
        /* প্রফেশনাল কার্ড ডিজাইন */
        .bio-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.04); display: flex; flex-direction: column; border: 1px solid #f1f5f9; transition: 0.3s; }
        @media (min-width: 768px) { .bio-card { flex-direction: row; } }
        .bio-card:hover { box-shadow: 0 15px 50px rgba(21, 128, 61, 0.1); transform: translateY(-3px); }
        
        .bio-left { background: linear-gradient(135deg, #f0fdf4, #dcfce7); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-right: 1px solid #e2e8f0; width: 100%; }
        @media (min-width: 768px) { .bio-left { width: 300px; flex-shrink: 0; } }
        
        .bio-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; transition: 0.4s; }
        .bio-card:hover .bio-img { transform: scale(1.05); border-color: #166534; }
        
        .bio-role-badge { background-color: #166534; color: #ffffff; padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 10px; display: inline-block; box-shadow: 0 4px 10px rgba(22, 101, 52, 0.2); }
        .bio-name-short { font-size: 20px; color: #166534; font-weight: 700; margin: 0 0 5px 0; }
        .bio-edu-short { font-size: 13px; color: #16a34a; font-weight: 600; margin: 0; }

        .bio-right { padding: 35px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .bio-story { font-size: 15px; color: #334155; line-height: 1.8; text-align: justify; margin: 0; }
        .bio-story strong { color: #166534; font-weight: 700; }
        .quote-icon { font-size: 30px; color: #cbd5e1; margin-bottom: 10px; opacity: 0.5; }

        .loader-container { text-align: center; padding: 60px 0; color: #15803d; }
        .spinner { border: 4px solid rgba(21, 128, 61, 0.1); border-left-color: #15803d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container" style="margin-top: 40px; margin-bottom: 80px;">
        
        <div class="committee-hero">
            <h3><i class="fas fa-sitemap" style="margin-right: 10px;"></i> কেন্দ্রীয় কমিটি ও কর্মকর্তাবৃন্দ</h3>
            <p>আল হুফফাজ ফাউন্ডেশন বাংলাদেশ একটি বৃহৎ পরিবার। যাঁদের নিরলস পরিশ্রম, প্রজ্ঞা, মেধা এবং একনিষ্ঠ সেবায় এই ফাউন্ডেশন আজ কুরআনের খেদমতে সারা দেশে সমাদৃত, নিচে আমাদের সেই সম্মানিত দায়িত্বশীল ও সদস্যদের সংক্ষিপ্ত পরিচিতি তুলে ধরা হলো।</p>
        </div>

        <div id="team-container" class="team-container">
            <div class="loader-container" id="loader">
                <div class="spinner"></div>
                <p style="font-weight: bold; font-size: 16px;">সদস্যদের তথ্য ও জীবনী লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAjv9u2Qn3EdVxNKBMcT1ezHp-5NitucT0",
            authDomain: "foundation-ntc.firebaseapp.com",
            databaseURL: "https://foundation-ntc-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "foundation-ntc",
            storageBucket: "foundation-ntc.firebasestorage.app",
            messagingSenderId: "940836724866",
            appId: "1:940836724866:web:6a93fad2b27d6e0302949b",
            measurementId: "G-P0N1WNK9GY"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const teamContainer = document.getElementById('team-container');
        const loader = document.getElementById('loader');

        const roleHierarchy = {
            "চেয়ারম্যান": 1,
            "সিনিয়র ভাইস চেয়ারম্যান": 2,
            "ভাইস চেয়ারম্যান": 3,
            "মহাসচিব": 4,
            "সাংগঠনিক সম্পাদক": 5,
            "সহ সাংগঠনিক সম্পাদক": 6,
            "যুগ্ম মহাসচিব": 7,
            "সহ যুগ্ম মহাসচিব": 8,
            "যুগ্ম সাধারণ সম্পাদক": 9,
            "সহ যুগ্ম সাধারণ সম্পাদক": 10,
            "শিক্ষা বিষয়ক সম্পাদক": 11,
            "২য় শিক্ষা বিষয়ক সম্পাদক": 12,
            "৩য় শিক্ষা বিষয়ক সম্পাদক": 13,
            "সহ শিক্ষা বিষয়ক সম্পাদক": 14,
            "অর্থ বিষয়ক সম্পাদক": 15,
            "সহ অর্থ বিষয়ক সম্পাদক": 16,
            "ধর্ম বিষয়ক সম্পাদক": 17,
            "সহ ধর্ম বিষয়ক সম্পাদক": 18,
            "প্রচার সম্পাদক ১": 19,
            "প্রচার সম্পাদক ২": 20,
            "সহ প্রচার সম্পাদক": 21
        };

        function getRolePriority(role) {
            return roleHierarchy[role] || 99;
        }

        db.collection("members").get().then((querySnapshot) => {
            loader.style.display = 'none';
            
            if(querySnapshot.empty) {
                teamContainer.innerHTML = '<p style="text-align:center; color:red; padding: 40px; background: #fff; border-radius: 10px;">ডাটাবেজে কোনো সদস্যের তথ্য পাওয়া যায়নি!</p>';
                return;
            }

            let membersArray = [];
            querySnapshot.forEach((doc) => {
                membersArray.push(doc.data());
            });

            membersArray.sort((a, b) => {
                const roleA = a.adminRole ? a.adminRole.trim() : "অনির্ধারিত পদবী";
                const roleB = b.adminRole ? b.adminRole.trim() : "অনির্ধারিত পদবী";
                
                const priorityA = getRolePriority(roleA);
                const priorityB = getRolePriority(roleB);
                
                if(priorityA === priorityB) {
                    const timeA = a.timestamp ? a.timestamp.seconds : 0;
                    const timeB = b.timestamp ? b.timestamp.seconds : 0;
                    return timeA - timeB; 
                }
                return priorityA - priorityB;
            });

            membersArray.forEach((data) => {
                const photo = data.photoUrl ? data.photoUrl : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
                const name = data.fullName || 'সম্মানিত সদস্য';
                const edu = data.education || data.currentStatus || 'প্রাতিষ্ঠানিক ও ইসলামী শিক্ষায় শিক্ষিত';
                const role = data.adminRole && data.adminRole.trim() !== '' ? data.adminRole : 'অনির্ধারিত পদবী';
                const displayRole = role === 'অনির্ধারিত পদবী' ? 'সংগঠনের শুভাকাঙ্ক্ষী' : role;
                
                let locationParts = [];
                if(data.village) locationParts.push(data.village + ' গ্রাম');
                if(data.thana) locationParts.push(data.thana + ' থানা');
                if(data.district) locationParts.push(data.district + ' জেলা');
                let locationStr = locationParts.length > 0 ? locationParts.join(', ') : 'বাংলাদেশের একটি ঐতিহ্যবাহী অঞ্চল';
                
                let fatherStr = data.fatherName ? `পিতা ${data.fatherName}-এর সুযোগ্য সন্তান ` : '';

                let storyHtml = `
                    <i class="fas fa-quote-left quote-icon"></i>
                    <p class="bio-story">
                        <strong>${name}</strong>, ${fatherStr}আল হুফফাজ ফাউন্ডেশন বাংলাদেশের একজন অত্যন্ত নিবেদিতপ্রাণ ও পরিশ্রমী ব্যক্তিত্ব। ${locationStr}-এর এক সম্ভ্রান্ত ও দ্বীনদার পরিবারে তাঁর বেড়ে ওঠা।
                        <br><br>
                        শিক্ষাজীবনে তিনি অত্যন্ত মেধা ও কৃতিত্বের সাথে <strong>${edu}</strong> সম্পন্ন করেছেন। প্রাতিষ্ঠানিক শিক্ষার পাশাপাশি দ্বীনি প্রচার ও প্রসারে তিনি সর্বদা অগ্রণী ভূমিকা পালন করে আসছেন।
                        <br><br>
                        ফাউন্ডেশনের লক্ষ্য ও উদ্দেশ্য বাস্তবায়নে তিনি সর্বদা সচেষ্ট। বর্তমানে তিনি সংগঠনে <strong>'${displayRole}'</strong> হিসেবে যুক্ত আছেন। কুরআনের হাফেজদের মানোন্নয়ন, হিফজ শিক্ষা ব্যবস্থার আধুনিকায়ন এবং ফাউন্ডেশনের যাবতীয় জনকল্যাণমূলক কার্যক্রমে তাঁর আন্তরিক অংশগ্রহণ ও দিকনির্দেশনা সত্যিই প্রশংসনীয়।
                    </p>
                `;

                const cardHTML = `
                    <div class="bio-card">
                        <div class="bio-left">
                            <img src="${photo}" alt="${name}" class="bio-img">
                            <span class="bio-role-badge">${displayRole}</span>
                            <h3 class="bio-name-short">${name}</h3>
                            <p class="bio-edu-short"><i class="fas fa-graduation-cap"></i> ${edu}</p>
                        </div>
                        <div class="bio-right">
                            ${storyHtml}
                        </div>
                    </div>
                `;
                teamContainer.innerHTML += cardHTML;
            });
        }).catch((error) => {
            console.log("Error getting documents: ", error);
            loader.innerHTML = '<p style="color:red; text-align:center;">তথ্য লোড করতে সমস্যা হয়েছে। ইন্টারনেট সংযোগ চেক করুন।</p>';
        });
    </script>
</body>
</html>
