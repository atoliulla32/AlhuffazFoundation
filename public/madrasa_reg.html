<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাদরাসা নিবন্ধন | আল হুফফাজ শিক্ষাবোর্ড</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --primary: #15803d; --secondary: #166534; --accent: #f59e0b; --bg: #f0fdf4; --text: #1e293b; }
        
        .form-wrapper { padding: 40px 15px 80px; }
        .form-container { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #bbf7d0;}
        
        .header-box { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; padding: 30px 20px; text-align: center; }
        .logo-box { width: 85px; height: 85px; margin: 0 auto 15px; background: #fff; padding: 5px; border-radius: 50%; }
        .logo-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .main-form { padding: 30px; }
        fieldset { border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 25px; margin-bottom: 30px; background: #fff; }
        legend { background: var(--secondary); color: #fff; padding: 6px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px;}
        label { font-size: 14px; font-weight: 700; color: #475569; }
        input, select, textarea { padding: 12px 15px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-family: inherit; font-size: 14px; background: #f8fafc; transition: 0.3s; width: 100%; box-sizing: border-box;}
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.1); background: #fff; }
        
        .manual-input { background: #fff7ed; border-color: #fdba74; font-weight: 600; color: #9a3412; }

        .photo-upload-container { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; padding: 20px; background: #f0fdf4; border: 2px dashed var(--primary); border-radius: 12px; }
        .photo-box { width: 110px; height: 110px; border: 2px dashed var(--primary); background: #fff; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; flex-shrink: 0;}
        .photo-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; display: none; }
        .photo-box input { display: none; }

        .btn-submit { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 18px; font-size: 18px; font-weight: bold; width: 100%; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        
        /* মডাল ও লোডার */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 100000; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
        .preview-modal-box { background: #f1f5f9; padding: 20px; border-radius: 20px; width: 95%; max-width: 850px; max-height: 92vh; display: flex; flex-direction: column; }
        .preview-content { flex-grow: 1; overflow-y: auto; background: #94a3b8; border-radius: 12px; padding: 15px 0; display: flex; justify-content: center; min-height: 0; }
        .loader-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; gap: 0; } }
        #pdf-render-container { display: none; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="loader-overlay" id="loaderOverlay">
        <div style="border: 5px solid rgba(255, 255, 255, 0.1); border-top-color: var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <div style="font-size: 24px; font-weight: bold; margin-top: 20px;"><span id="progressPercent">0</span>%</div>
        <p>তথ্য প্রসেস হচ্ছে...</p>
    </div>

    <div class="modal-overlay" id="previewModalOverlay">
        <div class="preview-modal-box" id="previewModalBox">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h2 style="margin:0; color:var(--secondary); font-size: 18px;">📄 আবেদনপত্রের প্রিভিউ</h2>
                <button onclick="closePreview()" style="background:none; border:none; font-size:28px; cursor:pointer; color:#ef4444;">&times;</button>
            </div>
            <div class="preview-content" id="previewContentDiv"></div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn-submit" style="background:#64748b; flex:1;" onclick="closePreview()">এডিট করুন</button>
                <button class="btn-submit" style="flex:2;" onclick="executeFinalSubmit()">সাবমিট ও ডাউনলোড</button>
            </div>
        </div>
    </div>

    <main class="form-wrapper">
        <div class="form-container">
            <header class="header-box">
                <div class="logo-box"><img src="https://res.cloudinary.com/ddvprmv9g/image/upload/v1777644601/gu7xxpbkokyrx9wgifsn.jpg" alt="Logo"></div>
                <h1>মাদরাসা নিবন্ধন আবেদন</h1>
                <p>আল হুফফাজ শিক্ষাবোর্ড বাংলাদেশ</p>
            </header>

            <form class="main-form" id="madrasaForm">
                <div class="photo-upload-container">
                    <label class="photo-box" id="photoContainer">
                        <span style="font-size: 12px; font-weight: bold; color: var(--secondary); text-align: center;">📷 লোগো/ছবি</span>
                        <img id="photoPreview">
                        <input type="file" id="photoInput" accept="image/*">
                    </label>
                    <div style="flex-grow: 1;">
                        <h3 style="margin: 0 0 5px 0; color: var(--primary);">ছবি আপলোড</h3>
                        <p style="margin: 0; font-size: 13px; color: #64748b;">মাদরাসার সম্মুখ ভাগ অথবা লোগোর ছবি দিন।</p>
                    </div>
                </div>

                <fieldset>
                    <legend>মাদরাসার তথ্য</legend>
                    <div class="form-group"><label>মাদরাসার নাম</label><input type="text" id="madrasaName" required></div>
                    <div class="grid-2">
                        <div class="form-group"><label>প্রতিষ্ঠা সাল</label><input type="number" id="establishedYear"></div>
                        <div class="form-group"><label>মাদরাসার ধরন</label><select id="madrasaType"><option value="আবাসিক">আবাসিক</option><option value="অনাবাসিক">অনাবাসিক</option><option value="আবাসিক ও অনাবাসিক">উভয়</option></select></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>শুরুর জামাত</label><input type="text" id="startClass" class="manual-input" placeholder="যেমন: নাজেরা" required></div>
                        <div class="form-group"><label>সর্বোচ্চ জামাত</label><input type="text" id="endClass" class="manual-input" placeholder="যেমন: হিফজ" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>মুহতামিমের নাম</label><input type="text" id="principalName" required></div>
                        <div class="form-group"><label>প্রতিষ্ঠাতার নাম</label><input type="text" id="founderName"></div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>যোগাযোগ ও ঠিকানা</legend>
                    <div class="grid-2">
                        <div class="form-group"><label>গ্রাম/মহল্লা</label><input type="text" id="village" required></div>
                        <div class="form-group"><label>ডাকঘর</label><input type="text" id="postOffice" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>থানা</label><input type="text" id="thana" required></div>
                        <div class="form-group"><label>জেলা</label><input type="text" id="district" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>মোবাইল নম্বর</label><input type="tel" id="phone" maxlength="11" required></div>
                        <div class="form-group"><label>ছাত্র সংখ্যা</label><input type="number" id="studentCount" required></div>
                    </div>
                </fieldset>

                <button type="submit" class="btn-submit">নিবন্ধন আবেদন ও প্রিভিউ</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div id="pdf-render-container"></div>

    <script src="script.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjv9u2Qn3EdVxNKBMcT1ezHp-5NitucT0",
            authDomain: "foundation-ntc.firebaseapp.com",
            projectId: "foundation-ntc",
            storageBucket: "foundation-ntc.firebasestorage.app",
            messagingSenderId: "940836724866",
            appId: "1:940836724866:web:b93b489374f410be02949b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let finalImageUrl = ""; let base64PhotoStr = "";
        window.pendingSubmissionData = null;

        document.getElementById('photoInput').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const preview = document.getElementById('photoPreview');
            const reader = new FileReader(); reader.onload = (ev) => { preview.src = ev.target.result; preview.style.display = "block"; base64PhotoStr = ev.target.result; }; reader.readAsDataURL(file);
            const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", "pending-management-afcmbd");
            try { 
                const res = await fetch(`https://api.cloudinary.com/v1_1/dd0dgwdkc/upload`, { method: "POST", body: formData }); 
                const data = await res.json();
                if(data.secure_url) finalImageUrl = data.secure_url;
            } catch (err) { alert("ছবি আপলোড ব্যর্থ!"); }
        });

        function buildPdfHtml(data) {
            const photoSrc = data.localPhoto || data.photoUrl;
            return `<div style="width: 794px; min-height: 1122px; padding: 40px; background: #fff; font-family: 'Noto Sans Bengali', sans-serif; position: relative; color: #000; line-height: 1.6;">
                <div style="border: 3px solid #166534; padding: 30px; border-radius: 5px;">
                    <div style="text-align: center; margin-bottom: 25px;">
                        <img src="https://res.cloudinary.com/ddvprmv9g/image/upload/v1777644601/gu7xxpbkokyrx9wgifsn.jpg" crossorigin="anonymous" style="width: 70px; height: 70px;">
                        <h1 style="margin: 0; font-size: 30px; color: #166534; font-weight: bold;">আল হুফফাজ শিক্ষাবোর্ড বাংলাদেশ</h1>
                        <div style="background: #166534; color: #fff; display: inline-block; padding: 6px 30px; font-size: 22px; font-weight: bold; border-radius: 50px; margin-top: 20px;">মাদরাসা নিবন্ধন আবেদন</div>
                    </div>
                    <div style="position: absolute; top: 50px; right: 50px; width: 110px; height: 130px; border: 1.5px solid #000; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        ${photoSrc ? `<img src="${photoSrc}" style="width:100%; height:100%; object-fit:cover;">` : 'ছবি'}
                    </div>
                    <table style="width: 100%; border-collapse: collapse; font-size: 18px; margin-top: 50px;">
                        <tr><td style="padding: 10px 0; width: 200px;">মাদরাসার নাম</td><td>: <b>${data.madrasaName}</b></td></tr>
                        <tr><td style="padding: 10px 0;">মুহতামিমের নাম</td><td>: ${data.principalName}</td></tr>
                        <tr><td style="padding: 10px 0;">শিক্ষা স্তর</td><td>: <b>${data.startClass}</b> থেকে <b>${data.endClass}</b> পর্যন্ত</td></tr>
                        <tr><td style="padding: 10px 0;">ছাত্র সংখ্যা</td><td>: ${data.studentCount} জন</td></tr>
                        <tr><td style="padding: 10px 0;">ঠিকানা</td><td>: ${data.village}, ${data.thana}, ${data.district}</td></tr>
                        <tr><td style="padding: 10px 0;">মোবাইল নম্বর</td><td>: <b>${data.phone}</b></td></tr>
                    </table>
                </div>
            </div>`;
        }

        document.getElementById('madrasaForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                photoUrl: finalImageUrl, localPhoto: base64PhotoStr,
                madrasaName: document.getElementById('madrasaName').value,
                establishedYear: document.getElementById('establishedYear').value,
                madrasaType: document.getElementById('madrasaType').value,
                startClass: document.getElementById('startClass').value,
                endClass: document.getElementById('endClass').value,
                principalName: document.getElementById('principalName').value,
                founderName: document.getElementById('founderName').value,
                village: document.getElementById('village').value,
                postOffice: document.getElementById('postOffice').value,
                thana: document.getElementById('thana').value,
                district: document.getElementById('district').value,
                phone: document.getElementById('phone').value,
                studentCount: document.getElementById('studentCount').value
            };
            window.pendingSubmissionData = data;
            const previewHTML = buildPdfHtml(data);
            const overlay = document.getElementById('previewModalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1'; document.getElementById('previewModalBox').style.transform = 'translateY(0)';
                const contentDiv = document.getElementById('previewContentDiv');
                const scale = Math.min(1, (contentDiv.clientWidth - 20) / 794);
                contentDiv.innerHTML = `<div style="transform: scale(${scale}); transform-origin: top center; width: 794px; height: 1122px; background:#fff;">${previewHTML}</div>`;
            }, 50);
        });

        window.closePreview = () => {
            document.getElementById('previewModalOverlay').style.display = 'none';
        };

        window.executeFinalSubmit = async () => {
            closePreview(); document.getElementById('loaderOverlay').style.display = 'flex';
            let prog = 0; const progEl = document.getElementById('progressPercent');
            const timer = setInterval(() => { if(prog < 90) prog += 5; progEl.innerText = prog; }, 200);

            try {
                const data = window.pendingSubmissionData;
                const dbData = { ...data, status: 'pending' }; delete dbData.localPhoto; dbData.timestamp = serverTimestamp();
                await addDoc(collection(db, "madrasa_registrations"), dbData);

                const pdfCont = document.getElementById('pdf-render-container');
                pdfCont.style.display = 'block'; pdfCont.innerHTML = buildPdfHtml(data);
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                const canvas = await html2canvas(pdfCont.firstElementChild, { scale: 2, useCORS: true });
                const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'pt', 'a4');
                pdf.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 595, 842);
                pdf.save(`Reg_${data.madrasaName}.pdf`);

                progEl.innerText = "100"; clearInterval(timer);
                alert("আলহামদুলিল্লাহ! আপনার আবেদন জমা হয়েছে।");
                window.location.reload();
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
