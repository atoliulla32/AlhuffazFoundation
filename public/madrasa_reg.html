<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাদরাসা নিবন্ধন | আল হুফফাজ শিক্ষাবোর্ড</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #15803d; --secondary: #166534; --accent: #f59e0b; --bg: #f8fafc; }
        .form-wrapper { padding: 40px 15px 80px; background: var(--bg); }
        .form-container { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0;}
        .header-box { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; padding: 30px 20px; text-align: center; }
        .logo-box { width: 85px; height: 85px; margin: 0 auto 15px; background: #fff; padding: 5px; border-radius: 50%; }
        .logo-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .main-form { padding: 30px; }
        fieldset { border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; margin-bottom: 30px; background: #fff; }
        legend { background: var(--secondary); color: #fff; padding: 6px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px;}
        label { font-size: 14px; font-weight: 700; color: #475569; }
        input, select, textarea { padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-family: inherit; background: #f8fafc; transition: 0.3s; width: 100%; box-sizing: border-box;}
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.1); }
        .btn-submit { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 18px; font-size: 18px; font-weight: bold; width: 100%; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); z-index: 100000; display: none; justify-content: center; align-items: center; padding: 15px; }
        .preview-modal-box { background: #fff; padding: 20px; border-radius: 20px; width: 100%; max-width: 800px; max-height: 95vh; display: flex; flex-direction: column; }
        .preview-content { flex-grow: 1; overflow-y: auto; background: #94a3b8; border-radius: 12px; padding: 20px 0; display: flex; justify-content: center; }
        .loader-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; gap: 0; } }
        #pdf-render-container { display: none; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="loader-overlay" id="loaderOverlay">
        <div style="border: 5px solid rgba(255, 255, 255, 0.1); border-top-color: var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <div style="font-size: 24px; font-weight: bold; margin-top: 20px;"><span id="progressPercent">0</span>%</div>
        <p>তথ্য প্রসেস হচ্ছে, দয়া করে অপেক্ষা করুন...</p>
    </div>
    <div class="modal-overlay" id="previewModalOverlay">
        <div class="preview-modal-box">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
                <h2 style="margin:0; color:var(--secondary); font-size: 18px;">📄 আবেদনপত্রের চূড়ান্ত প্রিভিউ</h2>
                <button onclick="closePreview()" style="background:none; border:none; font-size:30px; cursor:pointer; color:#ef4444;">&times;</button>
            </div>
            <div class="preview-content" id="previewContentDiv"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-submit" style="background:#64748b; flex:1;" onclick="closePreview()">✏️ এডিট</button>
                <button class="btn-submit" style="flex:2;" onclick="executeFinalSubmit()">✅ সাবমিট ও ডাউনলোড</button>
            </div>
        </div>
    </div>
    <main class="form-wrapper">
        <div class="form-container">
            <header class="header-box">
                <div class="logo-box"><img src="https://res.cloudinary.com/ddvprmv9g/image/upload/v1777644601/gu7xxpbkokyrx9wgifsn.jpg" alt="Logo"></div>
                <h1>মাদরাসা নিবন্ধন আবেদন</h1>
                <p>আল হুফফাজ শিক্ষাবোর্ড বাংলাদেশ</p>
            </header>
            <form class="main-form" id="madrasaForm">
                <div style="background:#f0fdf4; border:2px dashed var(--primary); padding:20px; border-radius:12px; display:flex; align-items:center; gap:20px; margin-bottom:30px;">
                    <label style="width:100px; height:100px; border:2px dashed var(--primary); background:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; position:relative; flex-shrink:0;">
                        <span id="photoText" style="font-size:11px; font-weight:bold; color:var(--secondary); text-align:center;">📷 ছবি দিন</span>
                        <img id="photoPreview" style="width:100%; height:100%; object-fit:cover; display:none; position:absolute;">
                        <input type="file" id="photoInput" accept="image/*" style="display:none;">
                    </label>
                    <div><h3 style="margin:0; color:var(--primary); font-size:16px;">মাদরাসার ছবি/লোগো</h3><p style="margin:0; font-size:13px; color:#64748b;">(আবশ্যক)</p></div>
                </div>
                <fieldset>
                    <legend>মাদরাসার প্রাথমিক তথ্য</legend>
                    <div class="form-group"><label>মাদরাসার পূর্ণ নাম (আবশ্যক)</label><input type="text" id="madrasaName" required></div>
                    <div class="grid-2">
                        <div class="form-group"><label>শুরুর জামাত</label><input type="text" id="startClass" placeholder="যেমন: নাজেরা" required></div>
                        <div class="form-group"><label>সর্বোচ্চ জামাত</label><input type="text" id="endClass" placeholder="যেমন: তাকমিল" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>মুহতামিমের নাম</label><input type="text" id="principalName" required></div>
                        <div class="form-group"><label>প্রতিষ্ঠাতা সাল</label><input type="number" id="estYear"></div>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>যোগাযোগ ও ঠিকানা</legend>
                    <div class="grid-2">
                        <div class="form-group"><label>গ্রাম/রাস্তা</label><input type="text" id="village" required></div>
                        <div class="form-group"><label>ডাকঘর</label><input type="text" id="postOffice" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>থানা</label><input type="text" id="thana" required></div>
                        <div class="form-group"><label>জেলা</label><input type="text" id="district" required></div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>মোবাইল নম্বর</label><input type="tel" id="phone" maxlength="11" required></div>
                        <div class="form-group"><label>ছাত্র সংখ্যা</label><input type="number" id="stdCount" required></div>
                    </div>
                </fieldset>
                <button type="submit" class="btn-submit">আবেদন জমা ও প্রিভিউ দেখুন</button>
            </form>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <div id="pdf-render-container"></div>
    <script src="script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAjv9u2Qn3EdVxNKBMcT1ezHp-5NitucT0", authDomain: "foundation-ntc.firebaseapp.com", projectId: "foundation-ntc", storageBucket: "foundation-ntc.firebasestorage.app", messagingSenderId: "940836724866", appId: "1:940836724866:web:b93b489374f410be02949b" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        let finalImageUrl = ""; let base64Str = ""; window.pendingData = null;

        document.getElementById('photoInput').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload=(ev)=>{ base64Str=ev.target.result; document.getElementById('photoPreview').src=ev.target.result; document.getElementById('photoPreview').style.display="block"; }; reader.readAsDataURL(file);
            const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", "pending-management-afcmbd");
            try { const res = await fetch(`https://api.cloudinary.com/v1_1/dd0dgwdkc/upload`, {method:"POST", body:formData}); const data=await res.json(); finalImageUrl=data.secure_url; } catch(err){ alert("ছবি আপলোড ব্যর্থ!"); }
        });

        function buildPdfHtml(data) {
            const photoSrc = data.localPhoto || data.photoUrl;
            const dateStr = new Date().toLocaleDateString('bn-BD');
            const smk = "AHFB/Reg/" + (Math.floor(Math.random()*9000)+1000);
            return `<div style="width:794px; min-height:1122px; background:#fff; padding:40px; font-family:'Noto Sans Bengali',sans-serif; color:#000; line-height:1.5; box-sizing:border-box; position:relative;">
                <div style="border:3px solid #166534; padding:30px; position:relative; border-radius:5px;">
                    <div style="text-align:center; margin-bottom:30px; border-bottom:2px double #166534; padding-bottom:15px;">
                        <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:5px;">
                            <img src="https://res.cloudinary.com/ddvprmv9g/image/upload/v1777644601/gu7xxpbkokyrx9wgifsn.jpg" crossorigin="anonymous" style="width:75px; height:75px;">
                            <h1 style="margin:0; font-size:34px; color:#166534; font-weight:bold;">আল হুফফাজ শিক্ষাবোর্ড বাংলাদেশ</h1>
                        </div>
                        <p style="margin:0; font-size:16px; color:#475569; font-weight:600;">কুরআনের আলোয় আলোকিত হোক বিশ্বময়</p>
                        <div style="background:#166534; color:#fff; display:inline-block; padding:5px 30px; border-radius:50px; font-weight:bold; font-size:22px; margin-top:15px;">মাদরাসা নিবন্ধন আবেদন ফরম</div>
                    </div>
                    <div style="position:absolute; top:35px; right:35px; width:110px; height:130px; border:1px solid #000; overflow:hidden; display:flex; align-items:center; justify-content:center; border-radius:4px;">
                        ${photoSrc ? `<img src="${photoSrc}" style="width:100%; height:100%; object-fit:cover;">` : 'ছবি'}
                    </div>
                    <div style="display:flex; justify-content:space-between; margin:20px 0; font-weight:bold; font-size:15px;">
                        <span>স্মারক নং: ${smk}</span>
                        <span>তারিখ: ${dateStr}</span>
                    </div>
                    <table style="width:100%; border-collapse:collapse; font-size:18px; margin-bottom:20px;">
                        <tr><td style="padding:10px 0; width:220px;">মাদরাসার নাম</td><td>: <b>${data.madrasaName}</b></td></tr>
                        <tr><td style="padding:10px 0;">মুহতামিমের নাম</td><td>: ${data.principalName}</td></tr>
                        <tr><td style="padding:10px 0;">শিক্ষা স্তর/জামাত</td><td>: <b>${data.startClass}</b> থেকে <b>${data.endClass}</b> পর্যন্ত</td></tr>
                        <tr><td style="padding:10px 0;">মোট ছাত্র সংখ্যা</td><td>: ${data.stdCount} জন</td></tr>
                        <tr><td style="padding:10px 0;">মাদরাসার ঠিকানা</td><td>: ${data.village}, ${data.thana}, ${data.district}</td></tr>
                        <tr><td style="padding:10px 0;">মোবাইল নম্বর</td><td>: <b>${data.phone}</b></td></tr>
                    </table>
                    <div style="margin-top:40px; border:1px solid #cbd5e1; padding:20px; border-radius:10px; text-align:justify; font-size:15px; color:#334155;">
                        <b>অঙ্গীকারনামা:</b> আমরা আল-হুফফাজ শিক্ষাবোর্ড বাংলাদেশ-এর সকল নিয়ম, সিলেবাস ও নীতিমালা মেনে মাদরাসা পরিচালনা করতে এবং বোর্ডের সকল কার্যক্রমে অংশগ্রহণ করতে অঙ্গীকারাবদ্ধ।
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:80px; text-align:center; font-weight:bold;">
                        <div style="width:180px; border-top:1px solid #000; padding-top:5px;">মুহতামিমের স্বাক্ষর</div>
                        <div style="width:180px; border-top:1px solid #000; padding-top:5px;">মহাসচিবের স্বাক্ষর</div>
                        <div style="width:180px; border-top:1px solid #000; padding-top:5px;">চেয়ারম্যানের স্বাক্ষর</div>
                    </div>
                </div>
                <div style="border-top:2px dashed #94a3b8; margin:40px 0; position:relative; text-align:center;">
                    <span style="position:absolute; top:-12px; background:#fff; padding:0 10px;">✂️ এখান থেকে কাটুন</span>
                </div>
                <div style="background:#f1f5f9; padding:25px; border-radius:10px; border:1px solid #cbd5e1; position:relative;">
                    <div style="text-align:center; margin-bottom:15px;">
                        <h2 style="margin:0; font-size:24px; color:#166534; font-weight:bold;">আল হুফফাজ শিক্ষাবোর্ড বাংলাদেশ</h2>
                        <div style="background:#166534; color:#fff; display:inline-block; padding:3px 20px; border-radius:15px; font-weight:bold; font-size:16px; margin-top:5px;">অফিসিয়াল রসিদ (মাদরাসা কপি)</div>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin:15px 0;">
                        <span>মাদরাসার নাম: <b>${data.madrasaName}</b></span>
                        <span>তারিখ: ${dateStr}</span>
                    </div>
                    <p style="text-align:center; font-size:14px; color:#475569;">আপনার মাদরাসা নিবন্ধনের আবেদনটি আমাদের দপ্তরে গ্রহণ করা হয়েছে। যাচাই-বাছাই শেষে চূড়ান্ত সনদ প্রদান করা হবে ইনশাআল্লাহ।</p>
                    <div style="display:flex; justify-content:space-between; margin-top:40px; font-weight:bold;">
                        <div style="border-top:1px solid #000; width:150px; text-align:center;">আবেদনকারীর স্বাক্ষর</div>
                        <div style="border-top:1px solid #000; width:150px; text-align:center;">বোর্ড প্রতিনিধির স্বাক্ষর</div>
                    </div>
                </div>
            </div>`;
        }

        document.getElementById('madrasaForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                photoUrl: finalImageUrl, localPhoto: base64Str,
                madrasaName: document.getElementById('madrasaName').value,
                startClass: document.getElementById('startClass').value,
                endClass: document.getElementById('endClass').value,
                principalName: document.getElementById('principalName').value,
                village: document.getElementById('village').value,
                postOffice: document.getElementById('postOffice').value,
                thana: document.getElementById('thana').value,
                district: document.getElementById('district').value,
                phone: document.getElementById('phone').value,
                stdCount: document.getElementById('stdCount').value
            };
            window.pendingData = data;
            const overlay = document.getElementById('previewModalOverlay');
            overlay.style.display='flex';
            setTimeout(()=>{
                overlay.style.opacity='1';
                const c = document.getElementById('previewContentDiv');
                const sc = Math.min(1, (c.clientWidth-20)/794);
                c.innerHTML = `<div style="transform:scale(${sc}); transform-origin:top center; width:794px; height:1122px; background:#fff;">${buildPdfHtml(data)}</div>`;
            }, 50);
        });

        window.closePreview = () => { document.getElementById('previewModalOverlay').style.display='none'; };

        window.executeFinalSubmit = async () => {
            closePreview(); document.getElementById('loaderOverlay').style.display='flex';
            let p = 0; const pEl = document.getElementById('progressPercent');
            const timer = setInterval(()=>{ if(p<90) p+=5; pEl.innerText=p; }, 200);
            try {
                const data = window.pendingData;
                const dbData = { ...data, status: 'pending' }; delete dbData.localPhoto; dbData.timestamp = serverTimestamp();
                await addDoc(collection(db, "madrasa_registrations"), dbData);
                const pdfCont = document.getElementById('pdf-render-container');
                pdfCont.style.display='block'; pdfCont.innerHTML = buildPdfHtml(data);
                await new Promise(r => setTimeout(r, 1000));
                const canvas = await html2canvas(pdfCont.firstElementChild, {scale:2, useCORS:true});
                const { jsPDF } = window.jspdf; const pdf = new jsPDF('p','pt','a4');
                pdf.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 595, 842);
                pdf.save(`Registration_${data.madrasaName}.pdf`);
                pEl.innerText="100"; clearInterval(timer);
                alert("আলহামদুলিল্লাহ! আপনার আবেদন জমা হয়েছে।"); window.location.reload();
            } catch(e) { alert("সমস্যা: " + e.message); document.getElementById('loaderOverlay').style.display='none'; clearInterval(timer); }
        };
    </script>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
